<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodo Dictionary</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bodo Dictionary</h1>
            <div id="searchArea">
                <input type="text" id="searchInput" placeholder="Search word...">
            </div>
        </header>

        <div class="btn-group">
            <button id="themeToggle" class="theme-button">🌓 Mode</button>
            <button id="contactButton" class="theme-button">📧 Contact</button>
        </div>

        <p id="statusMessage" class="status-info">Ready</p>

        <div id="bookTableContainer" style="display:none;">
            <table id="bookTable">
                <tbody id="bookTableBody"></tbody>
            </table>
        </div>

        <div id="descriptionArea" class="description-box" style="display:none;">
            <h2 id="descriptionTitle"></h2>
            <div id="definitionText"></div>
            <button id="backButton" class="action-btn">← Back to Search</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
